<!DOCTYPE html>
<html>
<head>
    <title>Form Đặt Phòng</title>
</head>

<body>

<div style="
    width:600px;
    border:2px solid black;
    padding:20px;
">

    <h1>Yêu cầu đặc biệt</h1>

    <p>Chọn loại giường</p>

    <input type="radio" name="giuong"> 1 giường King

    <span style="margin-left:180px;">
        <input type="radio" name="giuong"> 2 giường đơn
    </span>

    <br><br>

    <div style="
        background:#f1f1f1;
        padding:20px;
    ">

        <h2>Yêu cầu đặc biệt</h2>

        <input type="checkbox">
        Phòng không hút thuốc

        <br><br>

        <input type="checkbox">
        Phòng ở tầng cao

        <br><br>

        <h2>Yêu cầu riêng của bạn</h2>

        <textarea
            rows="5"
            cols="60"
            placeholder="Nhập yêu cầu khác">
        </textarea>

        <br><br>

        <button style="
            background:pink;
            color:white;
            border:none;
            padding:15px 40px;
            font-size:25px;
        ">
            Thanh toán
        </button>

    </div>

</div>

</body>
</html>
